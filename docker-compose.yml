services:
  balance:
    build:
      context: .
      args:
        PERL_VERSION: "5.42"
        ARRAPI_REF: main
        PLEXAPI_REF: main
    image: balance-app
    restart: unless-stopped
    ports:
      - "3010:3010"
    volumes:
      - artifacts:/artifacts
      - music:/media/music
      - tvshows:/media/tvshows
      - movies:/media/movies
      - books:/media/books
      - photos:/media/photos
      - dvr:/media/dvr
      - homevideo:/media/homevideo
      - tvshowsUHD:/media/tvshowsUHD
      - tvshows2:/media/tvshows2
      - tvshows3:/media/tvshows3
      - tvshows4:/media/tvshows4
      - tvnas2:/media/tvnas2
      - moviesUHD:/media/moviesUHD
    environment:
      BALANCE_ARTIFACT_ROOT: /artifacts
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3010/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  artifacts: {}
  music:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BALANCE_MUSIC_PATH:-/Volumes/music}
  tvshows:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BALANCE_TVSHOWS_PATH:-/Volumes/tvshows}
  movies:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BALANCE_MOVIES_PATH:-/Volumes/movies}
  books:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BALANCE_BOOKS_PATH:-/Volumes/books}
  photos:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BALANCE_PHOTOS_PATH:-/Volumes/photos}
  dvr:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BALANCE_DVR_PATH:-/Volumes/dvr}
  homevideo:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BALANCE_HOMEVIDEO_PATH:-/Volumes/homevideo}
  tvshowsUHD:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BALANCE_TVSHOWS_UHD_PATH:-/Volumes/tvshowsuhd}
  tvshows2:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BALANCE_TVSHOWS2_PATH:-/Volumes/tvshows2}
  tvshows3:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BALANCE_TVSHOWS3_PATH:-/Volumes/tvshows3}
  tvshows4:
