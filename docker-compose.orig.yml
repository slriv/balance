services:
  balance:
    build:
      context: .
      args:
        PERL_VERSION: "5.42"
        ARRAPI_REF: main
        PLEXAPI_REF: main
    image: balance-app
    restart: unless-stopped
    ports:
      - "3010:3010"
    volumes:
      - artifacts:/artifacts
    environment:
      BALANCE_ARTIFACT_ROOT: /artifacts
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3010/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  artifacts: {}
