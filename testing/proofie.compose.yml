---
services:
  squid:
    image: ubuntu/squid:latest
    container_name: squid
    environment:
      - PUID=5013
      - PGID=5000
      - TZ=America/Los_Angeles
    volumes:
      - /logs:/home/squid/logs
      - /data:/home/squid/data
      - ./squid.conf:/home/squid/config/squid.conf
      - ./passwords:/home/squid/config/passwords
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "squid", "-k", "parse"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    network_mode: service:surfshark
    depends_on:
      - surfshark
  movies_radarr_4k:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr4k
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - PUID=5001
      - PGID=5000
      - TZ=America/Los_Angeles
    volumes:
      - /home/radarr4k/config:/config
      - movies_4k:/movies
      - dl_shared:/downloads
    ports:
      - 2001:7878 # Radarr 4K web UI
    restart: unless-stopped
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  movies_radarr_primary:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - PUID=5002
      - PGID=5000
      - TZ=America/Los_Angeles
    volumes:
      - /home/radarr/config:/config
      - movies_primary:/movies 
      - dl_shared:/downloads
    ports:
      - 2000:7878 # Radarr web UI
    restart: unless-stopped
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  tv_sonarr_primary:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - PUID=5003
      - PGID=5000
      - TZ=America/Los_Angeles
    volumes:
      - /home/sonarr/config:/config
      - tv_primary:/tv #optional
      - tv_usb1:/tv2
      - tv_usb2:/tv3
      - tv_usb3:/tv4
      - tv_nas2:/tvnas2
      - dl_shared:/downloads #optional
    ports:
      - 2002:8989 # Sonarr web UI
    restart: unless-stopped
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  tv_sonarr_4k:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr4k
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - PUID=5004
      - PGID=5000
      - TZ=America/Los_Angeles
    volumes:
      - /home/sonarr4k/config:/config
      - tv_4k:/tv #optional
      - dl_shared:/downloads #optional
    ports:
      - 2003:8989 # Sonarr 4K web UI
    restart: unless-stopped
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  music_lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - PUID=5005
      - PGID=5000
      - TZ=America/Los_Angeles
    volumes:
      - /home/lidarr/config:/config
      - music_library:/music #optional
      - dl_shared:/downloads #optional
    ports:
      - 2004:8686 # Lidarr web UI
    restart: unless-stopped
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  surfshark:
    image: ilteoood/docker-surfshark
    container_name: surfshark
    environment:
      - SURFSHARK_USER=nDTRLhCWssUfD9uqyqycTLAX
      - SURFSHARK_PASSWORD=jYWhaK2HzhGksJhUUSLHAAPT
      - SURFSHARK_COUNTRY=us
      - SURFSHARK_CITY=sea
      - CONNECTION_TYPE=udp
      - LAN_NETWORK=10.0.0.0/24,10.10.10.0/24,10.0.2.0/24
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - 8080:3128 # Squid proxy
      - 8191:8191 # FlareSolverr API
      - 9000:8080 # SABnzbd web UI
      - 9001:9117 # Jackett web UI
      - 9091:9091 # Transmission web UI
      - 51413:51413 # Transmission peer port (TCP)
      - 51413:51413/udp # Transmission peer port (UDP)
    restart: unless-stopped
    dns:
      - 1.1.1.1
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 8.8.8.8 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  dl_sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=5010
      - PGID=5000
      - TZ=America/Los_Angeles
    volumes:
      - /home/sabnzbd/config:/config
      - dl_shared:/downloads #optional
      - /home/xfer:/incomplete #optional
      - dl_sab_watch:/watched
      - /home/sabnzbd/scripts:/scripts
    cap_add:
      - ALL
    restart: unless-stopped
    network_mode: service:surfshark
    depends_on:
      - surfshark
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  dl_transmission:
    image: lscr.io/linuxserver/transmission:4.0.1-r0-ls156
#    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    environment:
      - PUID=5011
      - PGID=5000
      - TZ=America/Los_Angeles
      - TRANSMISSION_WEB_HOME=/combustion-release/ #optional
      - USER=transmission #optional
      - PASS=transmission #optional
      - HOST_WHITELIST=10.0.*,10.10.*,172.* #optional
      #- PEERPORT=peerport #optional
      #- HOST_WHITELIST=dnsname list #optional
    volumes:
      - /home/transmission/config:/config
      - /home/xfer:/incomplete
      - dl_shared:/downloads
      - dl_trans_watch:/watch
    restart: unless-stopped
    network_mode: service:surfshark
    depends_on:
      - surfshark
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "transmission:transmission", "http://localhost:9091/transmission/web/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
  dl_jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - PUID=5012
      - PGID=5000
      - TZ=America/Los_Angeles
      - AUTO_UPDATE=true #optional
      #- RUN_OPTS=<run options here> #optional
    volumes:
      - /home/jackett/config:/config
      - dl_shared:/downloads
    restart: unless-stopped
    network_mode: service:surfshark
    depends_on:
      - surfshark
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "curl", "-4", "--connect-timeout", "5", "-f", "http://127.0.0.1:9117"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
  dl_flaresolverr:
    # DockerHub mirror flaresolverr/flaresolverr:latest
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=America/Los_Angeles
    restart: unless-stopped
    network_mode: service:surfshark
    depends_on:
      - surfshark
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
volumes:
  dl_shared:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,hard,intr,rw
      device: ":/volume1/media/downloads"
    labels:
      description: "Shared downloads directory for all download clients"
      nfs.server: "10.0.0.10"
      nfs.path: "/volume1/media/downloads"
  dl_trans_watch:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,hard,intr,rw
      device: ":/volume1/media/add-torrent"
    labels:
      description: "Transmission watch directory for auto-adding torrents"
      nfs.server: "10.0.0.10"
      nfs.path: "/volume1/media/add-torrent"
  dl_sab_watch:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,hard,intr,rw
      device: ":/volume1/media/sab-watched"
    labels:
      description: "SABnzbd watch directory for auto-adding NZBs"
      nfs.server: "10.0.0.10"
      nfs.path: "/volume1/media/sab-watched"
  movies_primary:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,hard,intr,rw
      device: ":/volume1/Movies"
    labels:
      description: "Standard definition movies library"
      nfs.server: "10.0.0.10"
      nfs.path: "/volume1/Movies"
  movies_4k:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,hard,intr,rw
      device: ":/volume1/4k/movies"
    labels:
      description: "4K movies library"
      nfs.server: "10.0.0.10"
      nfs.path: "/volume1/4k/movies"
  tv_primary:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,hard,intr,rw
      device: ":/volume2/TV"
    labels:
      description: "Primary TV shows library"
      nfs.server: "10.0.0.10"
      nfs.path: "/volume2/TV"
  tv_usb1:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,hard,intr,rw
      device: ":/volumeUSB1/usbshare"
    labels:
      description: "Secondary TV shows library (USB1)"
      nfs.server: "10.0.0.10"
      nfs.path: "/volumeUSB1/usbshare"
  tv_usb2:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,hard,intr,rw
      device: ":/volumeUSB2/usbshare"
    labels:
      description: "Tertiary TV shows library (USB2)"
      nfs.server: "10.0.0.10"
      nfs.path: "/volumeUSB2/usbshare"
  tv_usb3:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,hard,intr,rw
      device: ":/volumeUSB3/usbshare"
    labels:
      description: "Quaternary TV shows library (USB3)"
      nfs.server: "10.0.0.10"
      nfs.path: "/volumeUSB3/usbshare"
  tv_4k:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,hard,intr,rw
      device: ":/volume1/4k/TV Shows"
    labels:
      description: "4K TV shows library"
      nfs.server: "10.0.0.10"
      nfs.path: "/volume1/4k/TV Shows"
  tv_nas2:
    driver_opts:
      type: nfs
      o: addr=10.0.0.11,nolock,hard,intr,rw
      device: ":/volume1/tvnas2"
    labels:
      description: "TV shows library on secondary NAS"
      nfs.server: "10.0.0.11"
      nfs.path: "/volume1/tvnas2"
  music_library:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,hard,intr,rw
      device: ":/volume1/Music/Library"
    labels:
      description: "Music library for Lidarr"
      nfs.server: "10.0.0.10"
      nfs.path: "/volume1/Music/Library"


