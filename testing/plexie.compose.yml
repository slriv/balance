volumes:
  music:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volume1/Music/Library"
  tvshowsUHD:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volume1/4k/TV Shows"
  tvshows:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volume2/TV"
  tvshows2:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volumeUSB1/usbshare"
  tvshows3:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volumeUSB2/usbshare"
  tvshows4:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volumeUSB3/usbshare"
  tvnas2:
    driver_opts:
      type: nfs
      o: addr=10.0.0.11,nolock,soft,rw
      device: ":/volume1/tvnas2"
  movies:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volume1/Movies"
  moviesUHD:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volume1/4k/movies"
  books:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volume1/Books"
  photos:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volume1/photos"
  dvr:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volume1/video/DVR"
  homevideo:
    driver_opts:
      type: nfs
      o: addr=10.0.0.10,nolock,soft,rw
      device: ":/volume1/video/Home Videos"


