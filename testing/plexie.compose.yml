services:
  plex:
    container_name: plex
    image: plexinc/pms-docker
    environment:
      - TZ=America/Los_Angeles
      - PUID=5000
      - PGID=5000
    network_mode: host
    volumes:
      - /home/plex/config:/config
      - /dev/shm:/transcode
      - /home/plex/backups:/backups
      - music:/music
      - tvshowsUHD:/tvuhd
      - tvshows:/tv
      - tvshows2:/tv2
      - tvshows3:/tv3
      - tvshows4:/tv4
      - tvnas2:/tvnas2
      - movies:/movies
      - moviesUHD:/moviesuhd
      - photos:/photos
      - books:/books
      - dvr:/dvr
      - homevideo:/homevideo
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
