services:
  balance:
    image: balance-tv:local
    container_name: balance-tv
    init: true
    command: ["--threshold=20", "--plan-file=/artifacts/balance-plan.sh", "--log-file=/artifacts/balance-plan.log"]
    volumes:
      - ${TV_PATH_1:-/srv/tv}:/tv:ro
      - ${TV_PATH_2:-/srv/tv2}:/tv2:ro
      - ${TV_PATH_3:-/srv/tv3}:/tv3:ro
      - ${TV_PATH_4:-/srv/tvnas2}:/tvnas2:ro
      - ${ARTIFACTS_DIR:-./artifacts}:/artifacts

  balance_apply:
    image: balance-tv:local
    container_name: balance-tv-apply
    init: true
    command: ["--threshold=20", "--plan-file=/artifacts/balance-plan.sh", "--manifest-file=/artifacts/balance-apply-manifest.jsonl", "--log-file=/artifacts/balance-apply.log", "--apply"]
    restart: on-failure:3
    volumes:
      - ${TV_PATH_1:-/srv/tv}:/tv
      - ${TV_PATH_2:-/srv/tv2}:/tv2
      - ${TV_PATH_3:-/srv/tv3}:/tv3
      - ${TV_PATH_4:-/srv/tvnas2}:/tvnas2
      - ${ARTIFACTS_DIR:-./artifacts}:/artifacts

  balance_web:
    image: balance-tv:local
    container_name: balance-web
    init: true
    entrypoint: ["balance_web"]
    command: ["daemon", "-l", "http://*:8080"]
    restart: unless-stopped
    ports:
      - "${BALANCE_WEB_PORT:-8080}:8080"
    environment:
      - BALANCE_JOB_DB=/artifacts/balance-jobs.db
      - BALANCE_JOB_LOG_DIR=/artifacts/jobs
      - SONARR_BASE_URL
      - SONARR_API_KEY
      - PLEX_BASE_URL
      - PLEX_TOKEN
    volumes:
      - ${TV_PATH_1:-/srv/tv}:/tv:ro
      - ${TV_PATH_2:-/srv/tv2}:/tv2:ro
      - ${TV_PATH_3:-/srv/tv3}:/tv3:ro
      - ${TV_PATH_4:-/srv/tvnas2}:/tvnas2:ro
      - ${ARTIFACTS_DIR:-./artifacts}:/artifacts
      - ${CONFIG_DIR:-./config}:/config


